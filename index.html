<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Litup Cafe — Culinary Bar & Lounge | Hudson Lane, New Delhi</title>
    <meta name="description" content="The Litup Cafe — Where old charm meets new age flair. Premium culinary bar and lounge on Hudson Lane, New Delhi. Live music, rooftop dining, signature cocktails." />
    <meta property="og:title" content="The Litup Cafe — Culinary Bar & Lounge" />
    <meta property="og:description" content="Where old charm meets new age flair. Hudson Lane, New Delhi." />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Restaurant",
      "name": "The Litup Cafe",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "F-21, 2nd Floor, Opp. NDPL Office, Hudson Lane",
        "addressLocality": "New Delhi",
        "addressRegion": "Delhi",
        "postalCode": "110009",
        "addressCountry": "IN"
      },
      "telephone": "+917982488464",
      "openingHours": "Mo-Su 11:30-00:00",
      "servesCuisine": ["Global", "Indian", "Chinese", "Continental"],
      "priceRange": "₹₹₹"
    }
    </script>
  </head>
  <body>
    <canvas id="gold-dust" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9999;"></canvas>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      const canvas = document.getElementById('gold-dust');
      const ctx = canvas.getContext('2d');

      // Set canvas to full screen
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const particlesArray = [];
      const numberOfEmbers = 100; 
      const numberOfStones = 25; // Keeps it elegant and not overly crowded

      class Particle {
        constructor(type) {
          this.type = type; // 'ember' or 'stone'
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * canvas.height;
          
          // Both float upwards like heat rising
          this.speedY = (Math.random() * 0.5 + 0.1) * -1; 
          this.speedX = Math.random() * 0.4 - 0.2;

          if (this.type === 'stone') {
            this.size = Math.random() * 5 + 2; // Bigger than embers
            this.rotation = Math.random() * Math.PI * 2;
            this.rotationSpeed = (Math.random() - 0.5) * 0.02; // Slow spin
            this.vertices = Math.floor(Math.random() * 4) + 5; // Jagged 5-8 sided rocks
            
            // Generate random jagged edges for this specific stone
            this.radii = [];
            for(let i = 0; i < this.vertices; i++) {
              this.radii.push(this.size * (0.6 + Math.random() * 0.6));
            }
          } else {
            this.size = Math.random() * 1.5 + 0.5; // Tiny sparks
            const emberColors = ['255, 69, 0', '255, 140, 0', '204, 85, 0'];
            this.color = emberColors[Math.floor(Math.random() * emberColors.length)];
            this.opacity = Math.random() * 0.5 + 0.2;
          }
        }
        
        update() {
          this.x += this.speedX;
          this.y += this.speedY;
          if (this.type === 'stone') this.rotation += this.rotationSpeed;

          // Wrap around screen (resetting to bottom when they float to the top)
          if (this.x > canvas.width + 20) this.x = -20;
          else if (this.x < -20) this.x = canvas.width + 20;
          if (this.y < -20) {
            this.y = canvas.height + 20;
            this.x = Math.random() * canvas.width; // Randomize X when resetting
          }
        }
        
        draw() {
          if (this.type === 'stone') {
            // Draw Floating Volcanic Stone
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rotation);
            ctx.beginPath();
            
            for (let i = 0; i < this.vertices; i++) {
              const angle = (i / this.vertices) * Math.PI * 2;
              ctx.lineTo(Math.cos(angle) * this.radii[i], Math.sin(angle) * this.radii[i]);
            }
            ctx.closePath();
            
            // Solid dark rock center matching the background
            ctx.fillStyle = '#0a0402'; 
            ctx.fill();
            
            // Glowing hot cracked edge
            ctx.lineWidth = 0.8;
            ctx.strokeStyle = 'rgba(255, 90, 0, 0.4)'; 
            ctx.stroke();
            
            // Subtle outer glow for the rock
            ctx.shadowBlur = 5;
            ctx.shadowColor = 'rgba(204, 30, 0, 0.5)';
            ctx.stroke();
            
            ctx.restore();
          } else {
            // Draw Glowing Ember
            ctx.fillStyle = `rgba(${this.color}, ${this.opacity})`; 
            ctx.shadowBlur = 8;
            ctx.shadowColor = `rgba(${this.color}, 0.8)`;

            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.shadowBlur = 0; // Reset
          }
        }
      }

      function init() {
        // Spawn Embers
        for (let i = 0; i < numberOfEmbers; i++) {
          particlesArray.push(new Particle('ember'));
        }
        // Spawn Volcanic Stones
        for (let i = 0; i < numberOfStones; i++) {
          particlesArray.push(new Particle('stone'));
        }
      }

      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < particlesArray.length; i++) {
          particlesArray[i].update();
          particlesArray[i].draw();
        }
        requestAnimationFrame(animate);
      }

      init();
      animate();

      // Handle window resize seamlessly
      window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      });
    </script>
  </body>
</html>
